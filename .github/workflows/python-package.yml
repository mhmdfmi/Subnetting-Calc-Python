name: Python package

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: [3.8, 3.9, 3.10, 3.11, 3.12]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]
      - name: Run syntax checks
        run: python -m py_compile subnet_calc.py subnet_utils.py
      - name: Run code style checks
        run: |
          python -m black --check subnet_calc.py subnet_utils.py tests
          python -m flake8 subnet_calc.py subnet_utils.py tests
          python -m mypy subnet_calc.py subnet_utils.py
      - name: Run tests
        run: python -m pytest -q --cov=subnet_calc --cov=subnet_utils --cov-report=term-missing
