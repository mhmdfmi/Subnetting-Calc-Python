name: Python package

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    timeout-minutes: 90
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      max-parallel: 6
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show runner info
        run: |
          echo "Runner OS: $RUNNER_OS"
          python --version || true

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.local/share/pip
            C:\Users\runneradmin\AppData\Local\pip\Cache
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('**/pyproject.toml','**/requirements.txt','**/setup.cfg','**/setup.py') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-
            ${{ runner.os }}-pip-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Upgrade pip and show pip cache dir
        run: |
          python -m pip install --upgrade pip
          python -m pip cache info || true

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]
        env:
          PIP_DISABLE_PIP_VERSION_CHECK: "1"

      - name: Run syntax checks
        run: |
          python -m py_compile subnet_calc.py subnet_utils.py
        shell: bash

      - name: Run code style and static checks
        run: |
          python -m black --check subnet_calc.py subnet_utils.py tests
          python -m flake8 subnet_calc.py subnet_utils.py tests
          python -m mypy subnet_calc.py subnet_utils.py
        shell: bash

      - name: Run tests with coverage
        run: |
          python -m pytest -q --cov=subnet_calc --cov=subnet_utils --cov-report=term-missing
        shell: bash
